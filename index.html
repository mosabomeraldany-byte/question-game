<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذكاء الخارق</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #ffffff;
            --primary: #00f2fe;
            --secondary: #9d4edd;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        /* خلفية متوهجة ومتحركة */
        body {
            background: linear-gradient(-45deg, #050b14, #101f38, #1a0b2e, #0a1f1d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .quiz-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header { margin-bottom: 25px; }
        .header h1 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 20%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            font-size: 1rem;
            cursor: pointer;
            text-align: right;
            transition: all 0.2s ease;
            outline: none;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.03);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .option-btn.correct {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: var(--success) !important;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .option-btn.wrong {
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: var(--danger) !important;
            color: #fff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .next-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            display: none;
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.4);
        }

        .next-btn:hover { opacity: 0.9; }

        .result-screen { display: none; }
        .score-text { font-size: 3rem; font-weight: bold; margin: 20px 0; color: var(--primary); text-shadow: 0 0 15px rgba(0, 242, 254, 0.6); }
        .feedback { font-size: 1.2rem; color: #94a3b8; margin-bottom: 25px; }
        
        .restart-btn {
            padding: 12px 30px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .restart-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        /* لوحة الألعاب النارية */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            display: none;
        }
    </style>
</head>

    let quizData = []; 
    let currentQuestionIndex = 0;
    let score = 0;
    let fireworksInterval;

    const questionEl = document.getElementById('question');
    const optionsContainer = document.getElementById('options');
    const nextBtn = document.getElementById('next-button');
    const currentNumEl = document.getElementById('current-question-num');
    const progressEl = document.getElementById('progress');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const scoreEl = document.getElementById('score');
    const feedbackEl = document.getElementById('feedback-text');
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');

    function prepareRandomQuestions() {
        const shuffled = [...questionPool].sort(() => 0.5 - Math.random());
        quizData = shuffled.slice(0, 5);
    }

    function startQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        stopFireworks();
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        prepareRandomQuestions(); 
        showQuestion();
    }

    function showQuestion() {
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        if (quizData.length === 0) return;

        const currentQuestion = quizData[currentQuestionIndex];
        questionEl.innerText = currentQuestion.question;
        currentNumEl.innerText = currentQuestionIndex + 1;
        progressEl.style.width = ((currentQuestionIndex + 1) / quizData.length) * 100 + '%';

        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = option;
            button.onclick = () => selectOption(button, index);
            optionsContainer.appendChild(button);
        });
    }

    function selectOption(selectedButton, index) {
        const currentQuestion = quizData[currentQuestionIndex];
        const allButtons = optionsContainer.querySelectorAll('.option-btn');

        allButtons.forEach(btn => btn.disabled = true);

        if (index === currentQuestion.correct) {
            selectedButton.classList.add('correct');
            score++;
        } else {
            selectedButton.classList.add('wrong');
            allButtons[currentQuestion.correct].classList.add('correct');
        }

        nextBtn.style.display = 'block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        scoreEl.innerText = score;

        if (score === 5) {
            feedbackEl.innerText = "عبقري خارق! إجاباتك كلها صحيحة 🏆🔥";
            startFireworks(); // تشغيل الألعاب النارية فوراً عند الـ 5/5
        } else if (score >= 3) {
            feedbackEl.innerText = "ممتاز جداً! معلوماتك قوية وذكائك عالي ✨👏";
        } else {
            feedbackEl.innerText = "محاولة جيدة، يمكنك إعادة التحدي لرفع مستواك 🔄👍";
        }
    }

    function restartQuiz() {
        startQuiz();
    }

    // --- برمجية نظام الألعاب النارية الذكي ---
    let particles = [];
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function createFirework() {
        const x = Math.random() * canvas.width;
        const y = Math.random() * (canvas.height * 0.4) + (canvas.height * 0.1);
        const colors = ['#00f2fe', '#9d4edd', '#10b981', '#ef4444', '#ff007f', '#ffea00'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        for (let i = 0; i < 40; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                alpha: 1,
                color: color
            });
        }
    }

    function updateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05; // جاذبية خفيفة للأسفل
            p.alpha -= 0.015;

            if (p.alpha <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        if (canvas.style.display === 'block') {
            requestAnimationFrame(updateParticles);
        }
    }

    function startFireworks() {
        canvas.style.display = 'block';
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        updateParticles();
        fireworksInterval = setInterval(createFirework, 400); // إطلاق نار جديدة كل نصف ثانية تقريباً
    }

    function stopFireworks() {
        canvas.style.display = 'none';
        clearInterval(fireworksInterval);
        particles = [];
    }

    window.onload = function() {
        startQuiz();
    };
