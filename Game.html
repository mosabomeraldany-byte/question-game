<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذكاء الخارق 🧠🏆</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #050b14, #101f38);
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #ffffff;
            --primary: #00f2fe;
            --secondary: #9d4edd;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header {
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 20%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            font-size: 1rem;
            cursor: pointer;
            text-align: right;
            transition: all 0.2s ease;
            outline: none;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.03);
            transform: scale(1.02);
        }

        .option-btn.correct {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: var(--success) !important;
            color: #fff;
            font-weight: bold;
        }

        .option-btn.wrong {
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: var(--danger) !important;
            color: #fff;
        }

        .next-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            display: none;
        }

        .next-btn:hover { opacity: 0.9; }

        /* شاشة النتيجة النهائية */
        .result-screen { display: none; }
        .score-text { font-size: 3rem; font-weight: bold; margin: 20px 0; color: var(--primary); }
        .feedback { font-size: 1.2rem; color: #94a3b8; margin-bottom: 25px; }
        .restart-btn {
            padding: 12px 30px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .restart-btn:hover { background: var(--primary); color: #000; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div class="header">
                <h1>تحدي العباقرة 🧠</h1>
                <div style="font-size: 0.85rem; color: #94a3b8;">السؤال <span id="current-question-num">1</span> من 5</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress"></div>
                </div>
            </div>

            <div class="question-text" id="question">جاري تحميل السؤال الأول...</div>

            <div class="options-list" id="options">
                </div>

            <button class="next-btn" id="next-button" onclick="nextQuestion()">السؤال التالي ➡️</button>
        </div>

        <div id="result-screen" class="result-screen">
            <h2>🎉 انتهى التحدي!</h2>
            <div class="score-text"><span id="score">0</span> / 5</div>
            <div class="feedback" id="feedback-text">مستوى رائع!</div>
            <button class="restart-btn" onclick="restartQuiz()">إعادة التحدي 🔄</button>
        </div>
    </div>

<script>
    // مصفوفة الأسئلة
    const quizData = [
        {
            question: "ما هو الكوكب الملقب بالكوكب الأحمر؟ 🪐",
            options: ["المشتري", "المريخ", "الزهرة", "عطارد"],
            correct: 1
        },
        {
            question: "أي مما يلي يُعد لغة لبرمجة وتصميم واجهات مواقع الويب؟ 💻",
            options: ["Python", "HTML", "C++", "SQL"],
            correct: 1
        },
        {
            question: "ما هو أسرع حيوان بري في العالم؟ 🐆",
            options: ["النمر", "الأسد", "الفهد الصياد", "الغزال"],
            correct: 2
        },
        {
            question: "كم عدد قارات العالم؟ 🌍",
            options: ["5 قارات", "6 قارات", "7 قارات", "8 قارات"],
            correct: 2
        },
        {
            question: "ما هو الرمز الكيميائي للماء؟ 💧",
            options: ["CO2", "H2O", "O2", "NaCl"],
            correct: 1
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const questionEl = document.getElementById('question');
    const optionsContainer = document.getElementById('options');
    const nextBtn = document.getElementById('next-button');
    const currentNumEl = document.getElementById('current-question-num');
    const progressEl = document.getElementById('progress');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const scoreEl = document.getElementById('score');
    const feedbackEl = document.getElementById('feedback-text');

    // تشغيل اللعبة
    function startQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        showQuestion();
    }

    // عرض السؤال الحالي
    function showQuestion() {
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        const currentQuestion = quizData[currentQuestionIndex];
        questionEl.innerText = currentQuestion.question;
        currentNumEl.innerText = currentQuestionIndex + 1;
        progressEl.style.width = ((currentQuestionIndex + 1) / quizData.length) * 100 + '%';

        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = option;
            button.onclick = () => selectOption(button, index);
            optionsContainer.appendChild(button);
        });
    }

    // التحقق من الإجابة عند الضغط عليها
    function selectOption(selectedButton, index) {
        const currentQuestion = quizData[currentQuestionIndex];
        const allButtons = optionsContainer.querySelectorAll('.option-btn');

        // تعطيل كل الأزرار بعد الاختيار حتى لا يضغط مرة أخرى
        allButtons.forEach(btn => btn.disabled = true);

        if (index === currentQuestion.correct) {
            selectedButton.classList.add('correct');
            score++;
        } else {
            selectedButton.classList.add('wrong');
            // إظهار الإجابة الصحيحة باللون الأخضر ليتعلمها المستخدم
            allButtons[currentQuestion.correct].classList.add('correct');
        }

        nextBtn.style.display = 'block';
    }

    // الانتقال للسؤال التالي أو إنهاء اللعبة
    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    // عرض شاشة النهاية والنتيجة
    function showResult() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        scoreEl.innerText = score;

        if (score === 5) {
            feedbackEl.innerText = "عبقري خارق! إجاباتك كلها صحيحة 🏆🔥";
        } else if (score >= 3) {
            feedbackEl.innerText = "ممتاز جداً! معلوماتك قوية وذكائك عالي ✨👏";
        } else {
            feedbackEl.innerText = "محاولة جيدة، يمكنك إعادة التحدي لرفع مستواك 🔄👍";
        }
    }

    function restartQuiz() {
        startQuiz();
    }

    // البدء التلقائي عند تحميل الصفحة
    startQuiz();
</script>

</body>
</html>
